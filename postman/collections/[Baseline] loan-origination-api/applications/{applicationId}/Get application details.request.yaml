type: http
name: Get application details
url: '{{baseUrl}}/applications/:applicationId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: applicationId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "applicantId": "string",
            "productType": "string",
            "requestedAmount": 2040.569787304134,
            "termMonths": 3841,
            "status": "denied",
            "createdAt": "2002-08-31T11:02:52.905Z",
            "updatedAt": "1977-11-18T06:13:51.459Z",
            "underwritingResult": {
              "applicationId": "string",
              "status": "pending",
              "decision": "referred_to_manual",
              "riskScore": 47,
              "evaluatedAt": "2000-11-06T22:37:11.871Z"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Application details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Application not found
